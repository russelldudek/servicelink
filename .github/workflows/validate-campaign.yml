name: Validate candidate campaign

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out campaign
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate and validate PDFs
        run: |
          python -m pip install --disable-pip-version-check "weasyprint==68.0" "pypdf==6.4.0"
          python scripts/generate_pdfs.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser test dependency
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify hero layout boundaries
        shell: bash
        run: |
          python -m http.server 4173 >/tmp/servicelink-server.log 2>&1 &
          server_pid=$!
          trap 'kill ${server_pid}' EXIT
          node scripts/check_hero_layout.mjs
