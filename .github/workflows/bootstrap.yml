name: Assemble and publish candidate vision

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: candidate-vision-bootstrap
  cancel-in-progress: false

jobs:
  assemble:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out staged campaign
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct validated source bundle
        shell: bash
        run: |
          cat .campaign-source.part00 \
              .campaign-source.part01 \
              .campaign-source.part02 \
              .campaign-source.part03 \
              .campaign-source.part04 \
              .campaign-source.part05 \
              .campaign-source.part06 > /tmp/servicelink-source.tar.gz.b64
          base64 --decode /tmp/servicelink-source.tar.gz.b64 > /tmp/servicelink-source.tar.gz
          echo "342dc63bd71149f9f825cebdb76d43d2555ce06bfb8ff9949f5b6af29e0d918f  /tmp/servicelink-source.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file /tmp/servicelink-source.tar.gz --directory .
          rm -f .campaign-source.part00 \
                .campaign-source.part01 \
                .campaign-source.part02 \
                .campaign-source.part03 \
                .campaign-source.part04 \
                .campaign-source.part05 \
                .campaign-source.part06 \
                .github/workflows/bootstrap.yml
          sed -i '/^[[:space:]]*cache: pip$/d' .github/workflows/pages.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install document renderer
        run: python -m pip install --disable-pip-version-check "weasyprint==68.0" "pypdf==6.4.0"

      - name: Generate and validate PDFs
        run: python scripts/generate_pdfs.py

      - name: Commit complete candidate campaign
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish complete ServiceLink candidate campaign [skip ci]"
          git push origin HEAD:main

      - name: Request workflow-based Pages configuration
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          status=$(curl --silent --show-error --output /tmp/pages-response.json --write-out "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          if [ "${status}" = "404" ]; then
            curl --silent --show-error --fail-with-body \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          elif [ "${status}" = "200" ]; then
            curl --silent --show-error --fail-with-body \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          else
            cat /tmp/pages-response.json
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
