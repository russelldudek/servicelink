name: Normalize public build metadata

on:
  push:
    branches: ['fix/public-confidentiality-marker']
    paths:
      - '.github/workflows/neutralize-build-marker.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Replace the internal build-marker label
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          excluded = {Path('.github/workflows/neutralize-build-marker.yml')}
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path in excluded or path.suffix.lower() == '.pdf':
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              revised = text.replace('roleforge-build', 'candidate-build')
              if revised != text:
                  path.write_text(revised, encoding='utf-8')
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Normalize public build metadata [skip ci]'
          git push origin "HEAD:${GITHUB_REF_NAME}"
