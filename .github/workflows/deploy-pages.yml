name: Deploy candidate vision

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out audited main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Enable workflow-based Pages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          status=$(curl --silent --show-error --output /tmp/pages.json --write-out "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          if [ "${status}" = "404" ]; then
            curl --silent --show-error --fail-with-body \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          elif [ "${status}" = "200" ]; then
            curl --silent --show-error --fail-with-body \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          else
            cat /tmp/pages.json
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload audited main
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
