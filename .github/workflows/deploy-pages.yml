name: Validate and deploy candidate vision

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audited main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate and validate PDFs
        run: |
          python -m pip install --disable-pip-version-check "weasyprint==68.0" "pypdf==6.4.0"
          python scripts/generate_pdfs.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser test dependency
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify hero layout boundaries
        shell: bash
        run: |
          python -m http.server 4173 >/tmp/servicelink-server.log 2>&1 &
          server_pid=$!
          trap 'kill ${server_pid}' EXIT
          node scripts/check_hero_layout.mjs

      - name: Commit regenerated PDFs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "PDFs already match validated sources."
          else
            git commit -m "Regenerate validated candidate PDFs [skip ci]"
            git push origin HEAD:main
          fi

      - name: Enable workflow-based Pages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          status=$(curl --silent --show-error --output /tmp/pages.json --write-out "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          if [ "${status}" = "404" ]; then
            curl --silent --show-error --fail-with-body \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          elif [ "${status}" = "200" ]; then
            curl --silent --show-error --fail-with-body \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          else
            cat /tmp/pages.json
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload audited main
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
