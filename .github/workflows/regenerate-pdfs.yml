name: Regenerate validated PDFs

on:
  push:
    branches:
      - main
      - 'fix/**'
    paths:
      - '*.html'
      - 'styles.css'
      - 'plan.css'
      - 'scripts/generate_pdfs.py'
      - '.github/workflows/regenerate-pdfs.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pushed branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate and validate PDFs
        run: |
          python -m pip install --disable-pip-version-check "weasyprint==68.0" "pypdf==6.4.0"
          python scripts/generate_pdfs.py

      - name: Commit changed PDFs
        shell: bash
        run: |
          if git diff --quiet -- docs; then
            echo 'PDFs are already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs
          git commit -m 'Regenerate validated candidate PDFs [skip ci]'
          git push origin "HEAD:${GITHUB_REF_NAME}"
