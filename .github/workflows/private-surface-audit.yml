name: Candidate surface audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Scan candidate-facing source and PDFs
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check 'pypdf==6.4.0'
          python - <<'PY'
          import re
          from pathlib import Path
          from pypdf import PdfReader

          root = Path('.')
          self_path = Path('.github/workflows/private-surface-audit.yml')
          forbidden = 'roleforge'
          findings = []

          def normalized(value):
              return re.sub(r'[^a-z0-9]+', '', value.lower())

          for path in root.rglob('*'):
              if '.git' in path.parts or path == self_path:
                  continue
              if forbidden in normalized(str(path)):
                  findings.append(f'filename: {path}')
              if not path.is_file() or path.suffix.lower() == '.pdf':
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              if forbidden in normalized(text):
                  findings.append(f'text: {path}')

          for path in sorted((root / 'docs').glob('*.pdf')):
              reader = PdfReader(str(path))
              payload = [str(reader.metadata or {})]
              payload.extend(page.extract_text() or '' for page in reader.pages)
              if forbidden in normalized('\n'.join(payload)):
                  findings.append(f'pdf: {path}')

          if findings:
              raise SystemExit('Candidate surface audit failed:\n' + '\n'.join(findings))
          print('Candidate surface audit passed with zero matches.')
          PY
