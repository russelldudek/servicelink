name: Force Pages Refresh

on:
  push:
    paths:
      - '.github/workflows/force-pages-refresh.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache-bust campaign assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          version = '20260715-4'
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'href="styles\.css(?:\?[^\"]*)?"', f'href="styles.css?v={version}"', text)
              text = re.sub(r'src="app\.js(?:\?[^\"]*)?"', f'src="app.js?v={version}"', text)
              text = re.sub(r'href="(docs/[^\"]+\.pdf)(?:\?[^\"]*)?"', rf'href="\1?v={version}"', text)

              if path.name == 'index.html' and 'hero-fixes.css' not in text:
                  text = text.replace(
                      f'<link rel="stylesheet" href="styles.css?v={version}">',
                      f'<link rel="stylesheet" href="styles.css?v={version}">\n  <link rel="stylesheet" href="hero-fixes.css?v={version}">'
                  )

              if 'name="roleforge-build"' not in text:
                  text = text.replace(
                      '<meta name="viewport" content="width=device-width, initial-scale=1">',
                      '<meta name="viewport" content="width=device-width, initial-scale=1">\n  <meta name="roleforge-build" content="20260715-4">'
                  )

              path.write_text(text, encoding='utf-8')

          Path('.nojekyll').touch()
          Path('site-version.json').write_text(
              json.dumps({
                  'campaign': 'ServiceLink Senior Product Designer, AI',
                  'build': version,
                  'hero_layout_fix': True,
                  'timeline_gutter_fix': True,
                  'ninety_day_plan_pages': 3
              }, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit refresh marker
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll site-version.json '*.html'
          if git diff --cached --quiet; then
            echo "No refresh changes required."
          else
            git commit -m "Publish cache-busted ServiceLink campaign [skip ci]"
            git push origin HEAD:main
          fi
